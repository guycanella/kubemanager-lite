name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Job: Lint ────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

      - name: svelte-check
        working-directory: frontend
        run: npm run check

      - name: tsc
        working-directory: frontend
        run: npx tsc --noEmit

# ─── Job: Unit + Stress Tests ─────────────────────────────────────────────────
  test-unit:
    name: Unit + Stress Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test -v -race -count=1 ./...

      - name: Run stress tests
        run: go test -v -tags stress -run Stress -timeout 120s ./backend/streaming/

# ─── Job: Integration Tests (Docker) ─────────────────────────────────────────
#
# Runs against a real Docker daemon provided by the GitHub Actions runner itself.
# ubuntu-latest already has Docker installed and running — no DinD needed.
  test-integration-docker:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: [test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # Spin up a lightweight container so ListContainers and log stream
      # tests always find at least one running container to work with.
      - name: Start test container
        run: |
          docker run -d \
            --name kubemanager-test \
            --label ci=true \
            alpine:latest \
            sh -c "while true; do echo 'log line from ci container'; sleep 1; done"

      - name: Run Docker integration tests
        run: go test -v -tags integration -timeout 60s ./backend/docker/...

      - name: Stop test container
        if: always()
        run: docker rm -f kubemanager-test || true

# ─── Job: Integration Tests (Kubernetes) ─────────────────────────────────────
#
# Spins up a local cluster with kind (Kubernetes IN Docker).
# The k8s integration tests use t.Skipf when the cluster is unavailable,
# so this job degrades gracefully if kind setup fails.
  test-integration-k8s:
    name: Integration Tests (Kubernetes)
    runs-on: ubuntu-latest
    needs: [test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kubemanager-ci
          wait: 60s

      # kind writes the kubeconfig to ~/.kube/config automatically —
      # the same path the Kubernetes client reads in production.
      - name: Verify cluster is reachable
        run: kubectl cluster-info

      # Deploy a simple pod so ListPods and log stream tests have something to find.
      - name: Deploy test pod
        run: |
          kubectl run kubemanager-test \
            --image=alpine:latest \
            --restart=Never \
            -- sh -c "while true; do echo 'log line from ci pod'; sleep 1; done"
          kubectl wait pod/kubemanager-test --for=condition=Ready --timeout=60s

      - name: Run Kubernetes integration tests
        run: go test -v -tags integration -timeout 60s ./backend/kubernetes/...

# ─── Job: E2E Tests ───────────────────────────────────────────────────────────
#
# Runs the full Playwright suite against a live `wails dev` session.
# Requires a display server (Xvfb) because Wails uses GTK/WebKitGTK on Linux.
#
# Flow:
#   1. Install system deps (GTK, WebKit, Xvfb)
#   2. Start Xvfb on :99
#   3. Start `wails dev` in background (serves frontend on the auto port)
#   4. Wait for the dev server URL to appear in stdout (up to 60s)
#   5. Run Playwright pointing at that URL
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      # WebKitGTK + GTK are required by Wails on Linux
      - name: Install system dependencies (GTK + WebKit + Xvfb)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            xvfb \
            x11-utils

      # Wails/GTK needs a display even in headless CI
      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1280x800x24 &
          echo "DISPLAY=:99" >> $GITHUB_ENV

      # `wails dev` starts both the Go backend and the Vite dev server.
      # We capture the URL it prints and export it for Playwright.
      - name: Start wails dev server
        run: |
          wails dev 2>&1 | tee /tmp/wails-dev.log &
          echo "WAILS_PID=$!" >> $GITHUB_ENV

          for i in $(seq 1 60); do
            URL=$(grep -oP 'http://localhost:\d+' /tmp/wails-dev.log | head -1)
            if [ -n "$URL" ]; then
              echo "PLAYWRIGHT_BASE_URL=$URL" >> $GITHUB_ENV
              echo "Wails dev server ready at $URL"
              break
            fi
            sleep 1
          done

          if [ -z "$URL" ]; then
            echo "ERROR: wails dev server did not start within 60s"
            cat /tmp/wails-dev.log
            exit 1
          fi

      - name: Run Playwright tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.PLAYWRIGHT_BASE_URL }}
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop wails dev server
        if: always()
        run: kill $WAILS_PID 2>/dev/null || true

# ─── Job: Build macOS ─────────────────────────────────────────────────────────
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: [lint, test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build macOS (arm64)
        run: |
          wails build \
            -platform darwin/arm64 \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o kubemanager_lite-macos-arm64

      - name: Build macOS (amd64)
        run: |
          wails build \
            -platform darwin/amd64 \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o kubemanager_lite-macos-amd64

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            build/bin/kubemanager_lite-macos-arm64.app
            build/bin/kubemanager_lite-macos-amd64.app
          retention-days: 7

# ─── Job: Build Windows ───────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [lint, test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build Windows (amd64)
        run: |
          wails build `
            -platform windows/amd64 `
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" `
            -o kubemanager_lite-windows-amd64.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/kubemanager_lite-windows-amd64.exe
          retention-days: 7

# ─── Job: Build Linux ─────────────────────────────────────────────────────────
#
# Wails on Linux requires GTK3 and WebKit2GTK headers for CGO compilation.
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: [lint, test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build Linux (amd64)
        run: |
          wails build \
            -platform linux/amd64 \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o kubemanager_lite-linux-amd64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/bin/kubemanager_lite-linux-amd64
          retention-days: 7

# ─── Job: Release ─────────────────────────────────────────────────────────────
#
# Runs only on tag pushes (v*).
# Waits for all three platform builds to succeed before publishing.
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS builds
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: dist/

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist/

      - name: Zip macOS apps
        run: |
          cd dist
          zip -r kubemanager_lite-${{ github.ref_name }}-macos-arm64.zip \
            kubemanager_lite-macos-arm64.app
          zip -r kubemanager_lite-${{ github.ref_name }}-macos-amd64.zip \
            kubemanager_lite-macos-amd64.app

      - name: Make Linux binary executable
        run: chmod +x dist/kubemanager_lite-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KubeManager Lite ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
          files: |
            dist/kubemanager_lite-${{ github.ref_name }}-macos-arm64.zip
            dist/kubemanager_lite-${{ github.ref_name }}-macos-amd64.zip
            dist/kubemanager_lite-windows-amd64.exe
            dist/kubemanager_lite-linux-amd64