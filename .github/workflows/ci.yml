name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ─── Job: Lint ────────────────────────────────────────────────────────────────
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Scaffold frontend/dist for embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: Generate Wails bindings
        run: wails generate module

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --timeout=5m

      - name: svelte-check
        working-directory: frontend
        run: npm run check

# ─── Job: Unit + Stress Tests ─────────────────────────────────────────────────
  test-unit:
    name: Unit + Stress Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run unit tests
        run: go test -v -race -count=1 ./backend/...

      - name: Run stress tests
        run: go test -v -tags stress -run Stress -timeout 120s ./backend/streaming/

# ─── Job: Integration Tests (Docker) ─────────────────────────────────────────
  test-integration-docker:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: [test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Start test container
        run: |
          docker run -d \
            --name kubemanager-test \
            --label ci=true \
            alpine:latest \
            sh -c "while true; do echo 'log line from ci container'; sleep 1; done"

      - name: Run Docker integration tests
        run: go test -v -tags integration -timeout 60s ./backend/docker/...

      - name: Stop test container
        if: always()
        run: docker rm -f kubemanager-test || true

# ─── Job: Integration Tests (Kubernetes) ─────────────────────────────────────
  test-integration-k8s:
    name: Integration Tests (Kubernetes)
    runs-on: ubuntu-latest
    needs: [test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: kubemanager-ci
          wait: 60s

      - name: Verify cluster is reachable
        run: kubectl cluster-info

      - name: Deploy test pod
        run: |
          kubectl run kubemanager-test \
            --image=alpine:latest \
            --restart=Never \
            -- sh -c "while true; do echo 'log line from ci pod'; sleep 1; done"
          kubectl wait pod/kubemanager-test --for=condition=Ready --timeout=60s

      - name: Run Kubernetes integration tests
        run: go test -v -tags integration -timeout 60s ./backend/kubernetes/...

# ─── Job: E2E Tests ───────────────────────────────────────────────────────────
  test-e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev

      - name: Scaffold frontend/dist for embed
        run: mkdir -p frontend/dist && touch frontend/dist/index.html

      - name: Generate Wails bindings
        run: wails generate module

      - name: Start Vite dev server
        working-directory: frontend
        run: |
          npm run dev -- --port 5173 &
          echo "VITE_PID=$!" >> $GITHUB_ENV
          for i in $(seq 1 30); do
            if curl -s http://localhost:5173 > /dev/null 2>&1; then
              echo "Vite dev server ready"
              break
            fi
            sleep 1
          done

      - name: Run Playwright tests
        working-directory: frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:5173
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Stop Vite dev server
        if: always()
        run: kill $VITE_PID 2>/dev/null || true

# ─── Job: Build macOS ─────────────────────────────────────────────────────────
#
# Signs and notarizes the .app bundles using the Developer ID certificate.
# Signing only runs on tag pushes — dev builds are unsigned.
# Uses ditto (not zip) to preserve macOS extended attributes required for
# Gatekeeper to recognize the notarization ticket.
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    needs: [lint, test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Import certificate
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          CERTIFICATE_P12: ${{ secrets.APPLE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          rm /tmp/certificate.p12

          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"

      - name: Build macOS (arm64)
        run: |
          wails build \
            -platform darwin/arm64 \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}"
          mv build/bin/kubemanager_lite.app build/bin/kubemanager_lite-macos-arm64.app

      - name: Build macOS (amd64)
        run: |
          wails build \
            -platform darwin/amd64 \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}"
          mv build/bin/kubemanager_lite.app build/bin/kubemanager_lite-macos-amd64.app

      - name: Sign macOS apps
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          IDENTITY="Developer ID Application: Guilherme Canella ($APPLE_TEAM_ID)"

          for APP in \
            build/bin/kubemanager_lite-macos-arm64.app \
            build/bin/kubemanager_lite-macos-amd64.app; do
            codesign \
              --force \
              --deep \
              --options runtime \
              --entitlements build/entitlements.plist \
              --sign "$IDENTITY" \
              "$APP"
            echo "Signed: $APP"
            codesign --verify --strict "$APP" && echo "Verification OK"
          done

      # ditto preserves extended attributes and resource forks required for
      # Gatekeeper to recognize the notarization ticket after installation.
      - name: Zip macOS apps for notarization
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build/bin
          ditto -c -k --keepParent kubemanager_lite-macos-arm64.app \
            kubemanager_lite-macos-arm64-notarize.zip
          ditto -c -k --keepParent kubemanager_lite-macos-amd64.app \
            kubemanager_lite-macos-amd64-notarize.zip

      - name: Notarize macOS apps
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for ZIP in \
            build/bin/kubemanager_lite-macos-arm64-notarize.zip \
            build/bin/kubemanager_lite-macos-amd64-notarize.zip; do
            xcrun notarytool submit "$ZIP" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait \
              --timeout 30m
            echo "Notarized: $ZIP"
          done

      - name: Staple notarization ticket
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          xcrun stapler staple build/bin/kubemanager_lite-macos-arm64.app
          xcrun stapler staple build/bin/kubemanager_lite-macos-amd64.app

      # Use ditto for release zips too — preserves all macOS metadata so
      # Gatekeeper recognizes the app as notarized after the user unzips it.
      - name: Zip macOS apps for release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          cd build/bin
          ditto -c -k --keepParent kubemanager_lite-macos-arm64.app \
            kubemanager_lite-${{ steps.version.outputs.VERSION }}-macos-arm64.zip
          ditto -c -k --keepParent kubemanager_lite-macos-amd64.app \
            kubemanager_lite-${{ steps.version.outputs.VERSION }}-macos-amd64.zip

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: |
            build/bin/kubemanager_lite-${{ steps.version.outputs.VERSION }}-macos-arm64.zip
            build/bin/kubemanager_lite-${{ steps.version.outputs.VERSION }}-macos-amd64.zip
          retention-days: 7

# ─── Job: Build Windows ───────────────────────────────────────────────────────
  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: [lint, test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build Windows (amd64)
        run: |
          wails build `
            -platform windows/amd64 `
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" `
            -o kubemanager_lite-windows-amd64.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: build/bin/kubemanager_lite-windows-amd64.exe
          retention-days: 7

# ─── Job: Build Linux ─────────────────────────────────────────────────────────
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-22.04
    needs: [lint, test-unit]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.11.0

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Set version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=dev-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Build Linux (amd64)
        run: |
          wails build \
            -platform linux/amd64 \
            -ldflags "-X main.version=${{ steps.version.outputs.VERSION }}" \
            -o kubemanager_lite-linux-amd64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: build/bin/kubemanager_lite-linux-amd64
          retention-days: 7

# ─── Job: Publish Chocolatey ──────────────────────────────────────────────────
#
# Packs and pushes the Chocolatey package on tag pushes only.
# Depends on release so the GitHub Release exists before Chocolatey tests it.
  publish-chocolatey:
    name: Publish (Chocolatey)
    runs-on: windows-latest
    needs: [release]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      - name: Set version
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Update version and checksum in nuspec
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $exePath = "dist\kubemanager_lite-windows-amd64.exe"
          $checksum = (Get-FileHash $exePath -Algorithm SHA256).Hash.ToLower()

          # Update version in nuspec
          $nuspec = Get-Content "distribution\chocolatey\kubemanager-lite.nuspec" -Raw
          $nuspec = $nuspec -replace '<version>.*</version>', "<version>$version</version>"
          Set-Content "distribution\chocolatey\kubemanager-lite.nuspec" $nuspec

          # Update version and checksum in install script
          $install = Get-Content "distribution\chocolatey\tools\chocolateyInstall.ps1" -Raw
          $install = $install -replace "\`$version\s*=\s*'.*'", "`$version = '$version'"
          $install = $install -replace 'checksum64\s*=\s*''.*''', "checksum64     = '$checksum'"
          Set-Content "distribution\chocolatey\tools\chocolateyInstall.ps1" $install

          Write-Host "Version: $version"
          Write-Host "Checksum: $checksum"

      - name: Pack Chocolatey package
        shell: pwsh
        working-directory: distribution/chocolatey
        run: choco pack kubemanager-lite.nuspec

      - name: Push to Chocolatey
        shell: pwsh
        working-directory: distribution/chocolatey
        env:
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          choco push "kubemanager-lite.$version.nupkg" `
            --source https://push.chocolatey.org `
            --api-key $env:CHOCOLATEY_API_KEY

# ─── Job: Release ─────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download macOS builds
        uses: actions/download-artifact@v4
        with:
          name: macos-builds
          path: dist/

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: dist/

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: dist/

      - name: Make Linux binary executable
        run: chmod +x dist/kubemanager_lite-linux-amd64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: KubeManager Lite ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-beta') }}
          generate_release_notes: true
          files: |
            dist/kubemanager_lite-${{ github.ref_name }}-macos-arm64.zip
            dist/kubemanager_lite-${{ github.ref_name }}-macos-amd64.zip
            dist/kubemanager_lite-windows-amd64.exe
            dist/kubemanager_lite-linux-amd64